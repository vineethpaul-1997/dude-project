apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: vineethpv1997/devops-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
