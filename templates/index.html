<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python DevOps Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            width:90%;
            max-width:700px;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            margin-bottom:15px;
        }

        .status{
            display:inline-block;
            margin:20px 0;
            padding:10px 20px;
            background:#28a745;
            border-radius:30px;
            font-weight:bold;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
            gap:15px;
            margin-top:30px;
        }

        .card{
            background:rgba(255,255,255,0.15);
            padding:20px;
            border-radius:15px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            background:rgba(255,255,255,0.25);
        }

        button{
            margin-top:25px;
            padding:12px 25px;
            border:none;
            border-radius:30px;
            background:#fff;
            color:#007bff;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#f4f4f4;
        }

        footer{
            margin-top:25px;
            font-size:14px;
            opacity:0.8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚀 Python DevOps Demo</h1>

    <p>Welcome to the CI/CD Pipeline Demo Application</p>

    <div class="status">
        ✅ Application Running Successfully
    </div>

    <div class="cards">
        <div class="card">
            <h3>🐍 Python</h3>
            <p>Backend Service</p>
        </div>

        <div class="card">
            <h3>🐳 Docker</h3>
            <p>Containerized</p>
        </div>

        <div class="card">
            <h3>⚙️ Jenkins</h3>
            <p>CI/CD Pipeline</p>
        </div>

        <div class="card">
            <h3>☸️ Kubernetes</h3>
            <p>Orchestrated</p>
        </div>
    </div>

    <button onclick="showTime()">
        Check Server Time
    </button>

    <p id="time" style="margin-top:15px;"></p>

    <footer>
        Built with ❤️ for DevOps Learning
    </footer>

</div>

<script>
function showTime(){
    document.getElementById("time").innerHTML =
    "Current Time: " + new Date().toLocaleString();
}
</script>

</body>
</html>
